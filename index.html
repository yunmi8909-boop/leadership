<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 리더십 유형 Test</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>나의 리더십 유형 Test</h1>
        <div id="quiz-container">
            <div class="question-container">
                <div class="question-title" id="questionCategory"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
            </div>
            <div class="navigation">
                <button class="btn btn-secondary" id="prevBtn" onclick="previousQuestion()" style="display: none;">이전</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" disabled>다음</button>
            </div>
        </div>
        <div id="result-container" style="display: none;">
            <div id="result"></div>
            <button class="btn" onclick="restartQuiz()">다시 진단하기</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
